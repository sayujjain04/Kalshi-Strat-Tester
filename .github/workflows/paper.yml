name: paper-tracker

# Run the paper tracker headless during a game, then commit the logs to the repo.
# Trigger it manually (Actions tab → Run workflow) around tip-off, or let the
# schedule below fire. It auto-picks the live/upcoming game and stops at game end.
on:
  workflow_dispatch: {}
  schedule:
    # 23:30 UTC ≈ 6:30pm ET (typical NBA tip window). Adjust or remove.
    - cron: "30 23 * * *"

jobs:
  paper:
    runs-on: ubuntu-latest
    timeout-minutes: 340          # ~5.7h, under GitHub's 6h job cap; a game fits
    permissions:
      contents: write             # to commit logs back
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests websockets cryptography

      - name: Run paper tracker (headless, until the game ends)
        env:
          KALSHI_KEY_ID: ${{ secrets.KALSHI_KEY_ID }}
          KALSHI_PEM: ${{ secrets.KALSHI_PEM }}
        run: python3 run_paper.py --auto

      - name: Commit game logs
        if: always()              # commit even if the run was cut short
        run: |
          git config user.name "paper-bot"
          git config user.email "paper-bot@users.noreply.github.com"
          git add data/
          git commit -m "logs: paper run $(date -u +%Y-%m-%dT%H:%MZ)" || echo "nothing to commit"
          git push || echo "nothing to push"
