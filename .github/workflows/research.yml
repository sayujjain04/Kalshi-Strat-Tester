name: research
# Nightly autonomous quant research iteration. Free GitHub-hosted compute (public
# repo). Needs repo secret ANTHROPIC_API_KEY (see docs/OPEN_QUESTIONS.md). Budget-
# guarded in deploy/research_run.sh. Paper-only — never touches real money.
on:
  schedule:
    - cron: '30 13 * * *'        # ~daily, after the US slate settles (UTC)
  workflow_dispatch: {}           # manual trigger from the Actions tab
permissions:
  contents: write
concurrency:
  group: research
  cancel-in-progress: false
jobs:
  iterate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -q requests cryptography websockets
      - run: npm i -g @anthropic-ai/claude-code
      - name: research iteration (budget-guarded)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEARCH_MODEL: claude-sonnet-4-6
          MONTHLY_BUDGET_USD: ${{ vars.MONTHLY_BUDGET_USD || '25' }}
        run: bash deploy/research_run.sh
      - name: commit results
        run: |
          git config user.email "research-bot@users.noreply.github.com"
          git config user.name "kalshi-research-bot"
          git add -A
          git commit -m "research: autonomous iteration $(date -u +%FT%TZ)" || { echo "nothing to commit"; exit 0; }
          git pull --rebase --autostash -X union origin main || git rebase --abort || true
          git push origin main || { sleep 5; git pull --rebase --autostash -X union origin main; git push origin main; } || echo "push failed"
